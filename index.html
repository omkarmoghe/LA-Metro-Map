<!doctype html>
<html>
  <head>
    <title>LA Metro Live Map</title>
    <!-- <link rel="icon" type="image/x-icon" href="icon.png" /> -->

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Alpine.js -->
    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.store("ws", { connected: false });
        Alpine.store("map", { selectedStop: null });
        Alpine.store("train", { selectedTrain: null });
        Alpine.store("routes", {});
      });
    </script>
    <script src="https://unpkg.com/alpinejs" defer></script>

    <!-- MapLibre -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@^5.24/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@^5.24/dist/maplibre-gl.js"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="fonts.css" />
    <link rel="stylesheet" href="style.css" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
  </head>

  <body>
    <div id="map"></div>
    <div id="sheet" class="vertical-container">
      <div class="horizontal-container title" x-data="{ ws: $store.ws }">
        <span class="silkscreen-regular">LA Metro</span>
        <span x-text="ws.connected ? '🟢' : '🔴'"></span>
      </div>
      <div x-data="{ map: $store.map }" x-show="map.selectedStop">
        <span
          class="jetbrains-mono-bold"
          x-text="map.selectedStop?.stop_name"
        ></span>
      </div>
      <div
        class="vertical-container"
        x-data="{
          train: $store.train,
          routes: $store.routes
        }"
        x-show="train.selectedTrain"
      >
        <span
          class="jetbrains-mono-regular"
          x-text="'Train ' + train.selectedTrain?.vehicle.label"
        ></span>
        <div class="horizontal-container">
          <img
            class="route-icon"
            x-bind:src="routes[train.selectedTrain?.trip.routeId]?.iconography_url"
          />
          <span
            class="jetbrains-mono-bold"
            x-text="routes[train.selectedTrain?.trip.routeId]?.long_name"
          ></span>
        </div>
        <span
          class="jetbrains-mono-regular"
          x-text="
            train.selectedTrain?.trip.directionId === 0 ? routes[train.selectedTrain?.trip.routeId]?.description_0 : routes[train.selectedTrain?.trip.routeId]?.description_1
          "
        ></span>
      </div>
    </div>
  </body>

  <script src="map.js"></script>
  <script src="routes.js"></script>
  <script src="trains.js"></script>
</html>
