<!doctype html>
<html>
  <head>
    <title>LA Metro Live Map</title>
    <!-- <link rel="icon" type="image/x-icon" href="icon.png" /> -->

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Alpine.js -->
    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.store("ws", { connected: false });
        Alpine.store("map", { selectedStop: null });
      });
    </script>
    <script src="https://unpkg.com/alpinejs" defer></script>

    <!-- MapLibre -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@^5.24/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@^5.24/dist/maplibre-gl.js"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="fonts.css" />
    <link rel="stylesheet" href="style.css" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
  </head>

  <body>
    <div id="map"></div>
    <div id="sheet" x-data>
      <div class="title">
        <span class="silkscreen-regular">LA Metro</span>
        <span x-text="$store.ws.connected ? '🟢' : '🔴'"></span>
      </div>
      <div x-show="$store.map.selectedStop">
        <span
          class="jetbrains-mono-regular"
          x-text="$store.map.selectedStop?.stop_name"
        ></span>
      </div>
    </div>
  </body>

  <script src="map.js"></script>
  <script src="trains.js"></script>
</html>
